<!-- Email Field -->

<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 icon-focus-color" style="font-size: 20px;">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-latte/60 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 transition-colors" id="email" name="email" placeholder="usuario@cafeteriadante.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-lg text-label-lg text-espresso" for="password">Contraseña</label>
<a class="font-label-md text-label-md text-primary hover:text-espresso transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 icon-focus-color" style="font-size: 20px;">lock</span>
</div>

<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant/60 hover:text-espresso transition-colors" style="font-size: 20px;">visibility_off</span>
</div>
</div>
</div>

<div class="pt-2">
<button class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm font-label-lg text-label-lg text-on-primary bg-primary hover:bg-terracota focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-cream transition-all duration-200" type="submit">
